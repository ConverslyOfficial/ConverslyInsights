
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversly: Insight Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #030508;
            --bg-secondary: #080c14;
            --bg-glass: rgba(15, 23, 42, 0.6);
            --bg-glass-light: rgba(30, 41, 59, 0.4);
            --border-glass: rgba(148, 163, 184, 0.1);
            --border-glow: rgba(59, 130, 246, 0.5);
            --accent-blue: #3b82f6;
            --accent-blue-light: #60a5fa;
            --accent-cyan: #22d3ee;
            --accent-blue-dark: #2563eb;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated mesh gradient background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .mesh-gradient {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: meshFloat 20s ease-in-out infinite;
        }

        .mesh-1 {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            top: -20%;
            right: -20%;
            animation-delay: 0s;
        }

        .mesh-2 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
            bottom: -10%;
            left: -15%;
            animation-delay: -7s;
        }

        .mesh-3 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation-delay: -14s;
        }

        @keyframes meshFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.9); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-blue);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 60%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 35%; top: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 50%; top: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 65%; top: 25%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 80%; top: 55%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 90%; top: 40%; animation-delay: 6s; }
        .particle:nth-child(8) { left: 15%; top: 80%; animation-delay: 7s; }

        @keyframes particleFloat {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
            10% { opacity: 0.6; transform: translateY(-20px) scale(1); }
            90% { opacity: 0.6; transform: translateY(-100px) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(0); }
        }

        .container {
            max-width: none;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 10;
        }

        /* Premium floating glassmorphic header */
        header {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 1200px;
            padding: 14px 0 14px 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            z-index: 1000;
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 -20px 40px -20px rgba(59, 130, 246, 0.1) inset;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wordmark-link {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .wordmark {
            display: inline-block;
            padding: 0;
            background: transparent;
            color: rgba(250, 248, 242, 0.98);
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1;
            font-weight: 500;
            letter-spacing: -0.02em;
            white-space: nowrap;
            transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
            text-rendering: geometricPrecision;
            font-synthesis: none;
            text-transform: none;
            -webkit-font-smoothing: antialiased;
            filter: drop-shadow(0 0 1px rgba(255,255,255,0.15));
        }

        .wordmark-link:hover .wordmark {
            transform: none;
            opacity: 1;
            filter: drop-shadow(0 0 1px rgba(255,255,255,0.15));
        }

        .nav-link {
            color: rgba(148, 163, 184, 0.78);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(34, 211, 238, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link:hover::before {
            opacity: 1;
        }

        /* Hero Section with depth */
        .hero {
            text-align: center;
            padding: 180px 0 100px;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(34, 211, 238, 0.1));
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-blue-light);
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out, badgeGlow 3s ease-in-out infinite;
            position: relative;
            backdrop-filter: blur(20px);
        }

        .hero-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent-cyan), 0 0 40px var(--accent-cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.4), 0 0 60px rgba(34, 211, 238, 0.2); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        .hero h1 {
            font-size: clamp(48px, 7vw, 76px);
            font-weight: 600;
            line-height: 0.98;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .hero h1 .line1,
        .hero h1 .line2 {
            display: block;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero h1 .line2 {
            margin-top: -0.06em;
        }

        .hero h1 em {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 500;
            display: block;
            margin-top: -0.04em;
            margin-bottom: -0.02em;
            background: linear-gradient(135deg, var(--accent-blue-light) 0%, var(--accent-cyan) 50%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientShift 5s ease-in-out infinite;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 540px;
            margin: 0 auto 48px;
            line-height: 1.7;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-mesh">
        <div class="mesh-gradient mesh-1"></div>
        <div class="mesh-gradient mesh-2"></div>
        <div class="mesh-gradient mesh-3"></div>
    </div>

    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <header>
        <div class="container">
            <div class="header-content">
                <a href="https://conversly.io/" aria-label="Conversly Home" class="wordmark-link">
                    <span class="wordmark" aria-hidden="true">Conversly: Insight Directory</span>
                </a>
                <a href="https://conversly.io/" class="nav-link">conversly.io</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-badge">
                <span>Research-Backed Assessments</span>
            </div>
            <h1><span class="line1">Discover Your</span><em>Communication</em><span class="line2">Superpowers</span></h1>
            <p class="hero-subtitle">
                Unlock science-backed insights into your communication patterns, influence style, and interpersonal dynamics with our collection of free psychological assessments.
            </p>
        </div>
    </section>
</body>
</html>
